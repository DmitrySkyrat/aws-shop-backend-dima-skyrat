openapi: 3.0.0
info:
  title: Product Service API
  description: API for managing products
  version: 1.0.0
servers:
  - url: https://{api-id}.execute-api.{region}.amazonaws.com/prod
    description: Production server
paths:
  /products:
    get:
      summary: Get all products
      operationId: getProductsList
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '500':
          description: Internal server error
    post:
      summary: Create a new product
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductWithStock'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /products/{productId}:
    get:
      summary: Get product by ID
      operationId: getProductsById
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
          description: Product ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Missing productId
        '404':
          description: Product not found
        '500':
          description: Internal server error
components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        price:
          type: number
    ProductWithStock:
      allOf:
        - $ref: '#/components/schemas/Product'
        - type: object
          properties:
            count:
              type: integer
              minimum: 0
    CreateProductRequest:
      type: object
      required:
        - title
        - price
        - count
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
          exclusiveMinimum: 0
        count:
          type: integer
          minimum: 0
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
